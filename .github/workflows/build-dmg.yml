name: Build DMG

on:
  push:
    branches: [main, release]

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build DMG
        run: npm run electron:build

      - name: Extract version and branch metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH="${GITHUB_REF_NAME}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          if [ "$BRANCH" = "release" ]; then
            echo "tag=rc-latest" >> "$GITHUB_OUTPUT"
            echo "release_name=Argus RC (v${VERSION} · ${SHORT_SHA})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "label=Release Candidate" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "release_name=Argus Latest (v${VERSION} · ${SHORT_SHA})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "label=Latest from main" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog since last release
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "changelog<<EOF"
            git log "$RANGE" --pretty=format:"- %s" --no-merges | head -30
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body: |
            ## ${{ steps.meta.outputs.label }}

            Auto-built from `${{ steps.meta.outputs.branch }}` branch at commit ${{ steps.meta.outputs.short_sha }}.

            ### Changes

            ${{ steps.changelog.outputs.changelog }}

            ### Download

            - **Argus DMG** — macOS Apple Silicon (arm64)

            ### Install from source

            ```bash
            npm install -g argus-monitor
            argus install && argus start
            ```
          files: |
            dist/*.dmg
            dist/*.dmg.blockmap
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: false

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: argus-dmg-${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.short_sha }}
          path: dist/*.dmg
          retention-days: 30
