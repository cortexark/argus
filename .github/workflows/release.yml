name: Release

on:
  push:
    tags:
      - 'v*.*.*'            # triggers on version tags: v1.0.0, v1.2.3, etc.

jobs:
  test:
    name: Verify tests and build release artifact
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - run: npm run electron:rebuild
      - run: ARGUS_RUN_ELECTRON_SMOKE=1 npm run test:electron-runtime
      - run: npm run electron:build
      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: test            # only runs if tests pass
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history for changelog

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets-macos
          path: dist

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "changelog<<EOF"
            git log "$RANGE" --pretty=format:"- %s" --no-merges
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Argus ${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Install

            ```bash
            npm install -g argus-monitor
            argus install && argus start
            ```

            See [README](https://github.com/cortexark/argus#readme) for full usage.
          files: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
